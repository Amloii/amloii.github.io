  "@context": "https://schema.org",
  "@type": "ProfilePage",
  "name": "{{ page.title | escape }} · {{ site.title }}",
  "url": "{{ page.url | absolute_url }}",
  "inLanguage": "{{ page.lang | default: site.lang }}",

  }
}
