<script type="application/ld+json">
{% assign pv = site.data.cv.en.basics %}
{
  "@context": "https://schema.org",
  "@type": "Person",
  "name": {{ pv.name | jsonify }},
  "jobTitle": {{ pv.label | jsonify }},
  "email": "mailto:{{ pv.email }}",
  "description": {{ pv.summary | strip_newlines | jsonify }},
  "url": {{ '/' | absolute_url | jsonify }},
  {% comment %}
    knowsAbout intentionally stays in English: schema.org consumers
    (Google, LinkedIn) match these as canonical taxonomy labels. Localizing
    them weakens entity disambiguation. — Decision logged 2026-05-06.
  {% endcomment %}
  "knowsAbout": [
    "Artificial intelligence",
    "Large language models",
    "Agentic AI",
    "Retrieval augmented generation",
    "Multimodal machine learning"
  ],
  "sameAs": [
    {% for s in site.data.socials %}
      {{ s.url | jsonify }}{% unless forloop.last %},{% endunless %}
    {% endfor %}
  ]
}
</script>
