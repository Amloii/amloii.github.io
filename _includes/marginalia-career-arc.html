{% assign lg = page.lang | default: site.lang %}
{% assign t = site.data.i18n[lg].home %}

<div class="marginalia" aria-label="{{ t.career_arc_aria }}">
  <span class="caps-label">{{ t.career_arc_label }}</span>
  <ol style="font-style:normal;margin-top:.5rem">
    {% for step in t.career_arc_steps %}
      <li>{{ step }}</li>
    {% endfor %}
  </ol>
</div>
